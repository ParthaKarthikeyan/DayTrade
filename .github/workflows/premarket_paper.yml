name: Premarket paper bot

# Runs the live premarket gap-and-go bot against your Alpaca PAPER account each
# weekday morning, then exits when it flattens (~11:35 ET). Free GitHub runners.
#
# Scheduled workflows only run from the DEFAULT branch, so this must be on master.
# Requires repo secrets: ALPACA_API_KEY, ALPACA_SECRET_KEY (paper keys).

on:
  workflow_dispatch:        # run manually any time (it self-skips outside the window)
  schedule:
    # Fire EARLY with a big buffer. GitHub's scheduled queue can delay a run by
    # minutes to a few hours; the bot itself then idles until pm_session_start
    # (07:00 ET) before trading, so the actual session start is consistent no
    # matter when the runner boots. 09:23 UTC = 05:23 ET (EDT); the odd minute
    # avoids the top-of-hour scheduling congestion that caused the worst delays.
    - cron: "23 9 * * 1-5"

# Alpaca's free tier allows only ONE live data websocket per account. If a manual
# run overlaps the scheduled run, the second connection gets HTTP 429
# "connection limit exceeded" and trades nothing all session. Serialise runs of
# this workflow and let the in-progress one finish (don't cancel a live session).
concurrency:
  group: premarket-paper-bot
  cancel-in-progress: false

permissions:
  contents: write   # to commit the durable daily ledger back to the repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 420     # covers an early boot + idle-wait through the 11:35 ET flatten
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run premarket paper bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: "true"
          ALPACA_DATA_FEED: iex
          PYTHONUNBUFFERED: "1"   # stream prints live instead of block-buffering on the CI pipe
        run: |
          if [ -z "$ALPACA_API_KEY" ]; then
            echo "::error::Missing ALPACA_API_KEY / ALPACA_SECRET_KEY repository secrets."
            exit 1
          fi
          python run_premarket_paper.py
      - name: Commit forward ledger
        if: always()   # record the day even if the bot step hit a snag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_ledger/premarket_paper.json
          if git diff --cached --quiet; then
            echo "No ledger change to commit."
          else
            git commit -m "premarket paper bot: daily ledger update"
            # master may have advanced during the ~2.5h session; rebase then push.
            git pull --rebase origin master || true
            git push origin HEAD:master
          fi
