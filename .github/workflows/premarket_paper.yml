name: Premarket paper bot

# Runs the live premarket gap-and-go bot against your Alpaca PAPER account each
# weekday morning, then exits when it flattens (~11:35 ET). Free GitHub runners.
#
# Scheduled workflows only run from the DEFAULT branch, so this must be on master.
# Requires repo secrets: ALPACA_API_KEY, ALPACA_SECRET_KEY (paper keys).

# TRIGGERING (updated 2026-07-06 after a 3.5h queue delay cost a session):
# GitHub `schedule` events are best-effort and can queue for HOURS on busy
# mornings, so the PRIMARY trigger is an external scheduler (cron-job.org)
# calling the workflow_dispatch API at 06:35 and a retry at 06:50 ET —
# dispatches start within seconds. The cron below is a LAST-RESORT fallback;
# the concurrency group + the bot's own window checks guarantee exactly one
# traded session per day no matter how many triggers fire.
#
# NOTE the 6-hour hard cap on hosted runners: a job that boots at 05:23 ET
# would be killed at ~11:23 ET, BEFORE the 11:35 flatten + ledger write.
# Trigger times must keep boot-to-flatten under ~5.5h (06:35 boot -> 5h0m).

on:
  workflow_dispatch:        # PRIMARY: external scheduler hits this via the API
  schedule:
    # Fallback only. 10:40 UTC = 06:40 ET during EDT (07:40 ET off-season,
    # still inside the premarket window). Odd minute avoids peak congestion.
    - cron: "40 10 * * 1-5"

# Alpaca's free tier allows only ONE live data websocket per account. If a manual
# run overlaps the scheduled run, the second connection gets HTTP 429
# "connection limit exceeded" and trades nothing all session. Serialise runs of
# this workflow and let the in-progress one finish (don't cancel a live session).
concurrency:
  group: premarket-paper-bot
  cancel-in-progress: false

permissions:
  contents: write   # to commit the durable daily ledger back to the repo

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # hosted runners hard-cap at 360; stay under it so
                             # our own timeout (not the platform's kill) ends a
                             # runaway job and the ledger commit step still runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run premarket paper bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: "true"
          ALPACA_DATA_FEED: iex   # execution/quotes; BARS come from Yahoo (below)
          # Consolidated all-venue 1m bars via Yahoo polling — the IEX stream
          # left the bot blind on low-float names (36 bars/session, 2026-07-10).
          # Set to "iex_stream" to fall back to the old websocket.
          PM_DATA_SOURCE: yahoo
          PM_BANKROLL: "10000"    # the notional book the bot trades & is judged on
          # Optional near-live dashboard feed (no-op if unset): a gists-scoped PAT
          # and the id of the gist the dashboard polls.
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PYTHONUNBUFFERED: "1"   # stream prints live instead of block-buffering on the CI pipe
        run: |
          if [ -z "$ALPACA_API_KEY" ]; then
            echo "::error::Missing ALPACA_API_KEY / ALPACA_SECRET_KEY repository secrets."
            exit 1
          fi
          python run_premarket_paper.py
      - name: Commit forward ledger
        if: always()   # record the day even if the bot step hit a snag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_ledger/premarket_paper.json paper_ledger/premarket_trades.json
          if git diff --cached --quiet; then
            echo "No ledger change to commit."
          else
            git commit -m "premarket paper bot: daily ledger update"
            # master may have advanced during the ~2.5h session; rebase then push.
            git pull --rebase origin master || true
            git push origin HEAD:master
          fi
